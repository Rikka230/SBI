<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBI - Connexion</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="sbi-diagonal-bg">

    <header class="site-header">
        <div class="logo-container sbi-break-box">
            <a href="index.html" class="logo-text" style="color: white; text-decoration: none;">SBI</a>
        </div>
    </header>

    <main style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 0 5%;">
        <div class="card fade-in" style="width: 100%; max-width: 400px; padding: 3rem 2rem;">
            <h1 class="uppercase text-center" style="margin-bottom: 2rem;">C<span class="text-blue">O</span>NNEXION</h1>
            
            <form id="login-form">
                <div style="margin-bottom: 1.5rem; text-align: left;">
                    <label for="email" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Email</label>
                    <input type="email" id="email" required style="width: 100%; padding: 1rem; border-radius: 4px; border: 1px solid #333; background: var(--bg-dark); color: white; font-size: 1rem;">
                </div>
                
                <div style="margin-bottom: 2rem; text-align: left;">
                    <label for="password" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Mot de passe</label>
                    <input type="password" id="password" required style="width: 100%; padding: 1rem; border-radius: 4px; border: 1px solid #333; background: var(--bg-dark); color: white; font-size: 1rem;">
                </div>
                
                <button type="submit" class="btn-primary btn-massive" style="width: 100%; padding: 1rem; font-size: 1rem;">Se connecter</button>
            </form>
            
            <div id="error-message" style="color: #ff4a4a; margin-top: 1rem; text-align: center; display: none; font-weight: bold;"></div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
