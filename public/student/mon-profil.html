<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Profil - SBI Student</title>
    <link rel="stylesheet" href="/admin/css/admin-layout.css">
    <link rel="stylesheet" href="/admin/css/admin.css">
    <link rel="stylesheet" href="/student/css/student.css">
    <script src="/admin/js/components.js"></script>
</head>
<body class="preload">
<div class="app-container" id="app-container">
    <student-left-panel></student-left-panel>
    <student-top-bar></student-top-bar>

    <main id="main-content">
        <div class="content-wrapper">
            <div class="profile-header">
                <div class="avatar-wrapper">
                    <div class="avatar-container" id="prof-avatar"><span>U</span></div>
                    <div class="edit-avatar-badge edit-mode-only" id="btn-trigger-crop">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    </div>
                </div>
                <div class="profile-info">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <h1 id="prof-name">Chargement...</h1>
                            <p id="prof-bio-display">Élève SBI</p>
                            <div class="xp-badge">Niveau <span id="prof-level">1</span> (<span id="prof-xp">0</span> XP)</div>
                        </div>
                        <button id="btn-toggle-edit" class="private-section">✏️ Modifier mon profil</button>
                    </div>
                </div>
            </div>

            <div class="hub-grid">
                <div class="left-col">
                    <div class="hub-card">
                        <h3 class="section-title">🏆 Réussites</h3>
                        <div class="badges-grid">
                            <div class="badge-slot" id="badge-bronze">🥉</div>
                            <div class="badge-slot" id="badge-silver">🥈</div>
                            <div class="badge-slot" id="badge-gold">🥇</div>
                            <div class="badge-slot" id="badge-diamond">💎</div>
                        </div>
                    </div>
                    <div class="hub-card">
                        <h3 class="section-title">📚 Formations</h3>
                        <div id="prof-formations-list">...</div>
                    </div>
                </div>
                <div class="right-col">
                    <div class="hub-card">
                        <h3>Profil Public</h3>
                        <textarea id="prof-bio" rows="5" style="resize:none; width:100%;" disabled></textarea>
                        <button id="btn-save-public" class="edit-mode-only">Enregistrer la bio</button>
                    </div>
                    <div class="hub-card private-section">
                        <h3>🔒 Données Privées</h3>
                        <input type="email" id="prof-email" disabled>
                        <input type="tel" id="prof-phone" placeholder="Téléphone" disabled>
                        <input type="text" id="prof-address" placeholder="Adresse" disabled>
                        <p>Temps total : <span id="prof-time">0h 0m</span></p>
                        <button id="btn-save-private" class="edit-mode-only">Sauvegarder</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="crop-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; flex-direction: column;">
    <div style="background: white; padding: 2rem; border-radius: 12px; text-align: center; max-width: 400px; width: 100%;">
        <h3>Recadrage photo</h3>
        <input type="file" id="pfp-file-input" accept="image/*" style="display: none;">
        <div id="crop-zone" onclick="document.getElementById('pfp-file-input').click()" style="border: 2px dashed #ccc; border-radius: 50%; width: 250px; height: 250px; margin: 0 auto; overflow: hidden; position: relative; cursor: pointer;">
            <span id="crop-placeholder">Cliquez pour choisir</span>
            <img id="crop-image" src="" style="display: none; width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button id="btn-save-crop" style="flex:1; background: var(--accent-green); color: white; border:none; padding:10px; border-radius:8px;">Appliquer</button>
            <button id="btn-cancel-crop" style="flex:1; background: #eee; border:none; padding:10px; border-radius:8px;">Annuler</button>
        </div>
    </div>
</div>

<script type="module" src="/js/profile-core.js"></script>
</body>
</html>
