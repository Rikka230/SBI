<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - SBI Student</title>
    
    <link rel="stylesheet" href="/admin/css/admin-layout.css">
    <link rel="stylesheet" href="/admin/css/admin.css">
    <link rel="stylesheet" href="/admin/css/admin-notifications.css">
    <link rel="stylesheet" href="/student/css/student.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    
    <script src="/admin/js/components.js"></script>
    
    <style>
        .profile-header { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); padding: 2.5rem; display: flex; align-items: center; gap: 2rem; margin-bottom: 2.5rem; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); position: relative; overflow: hidden; }
        .profile-header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 100px; background: linear-gradient(90deg, var(--accent-blue), #5B7FFF); opacity: 0.15; z-index: 0; }
        .profile-header::after { content: ''; position: absolute; right: 2rem; top: 2rem; width: 170px; height: 170px; border: 1px solid rgba(42, 87, 255, 0.14); transform: rotate(45deg); pointer-events: none; }
        
        .avatar-wrapper { position: relative; width: 120px; height: 120px; z-index: 1; margin: 0; flex-shrink: 0; }
        
        .profile-info { z-index: 1; flex-grow: 1; }
        .profile-info h1 { margin: 0 0 0.5rem 0; font-size: 2rem; color: var(--text-main); display: flex; align-items: center; gap: 0.5rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-main); font-size: 0.95rem; }
        .prof-input { width: 100%; padding: 0.8rem 1rem; border: 1px solid transparent; border-radius: 8px; background: transparent; color: var(--text-main); font-family: inherit; font-size: 0.95rem; outline: none; transition: 0.2s; }
        
        .editing .prof-input { background: #f9fafb; border-color: var(--border-color); }
        .editing .prof-input:focus { border-color: var(--accent-blue); background: #fff; box-shadow: 0 0 0 3px rgba(42, 87, 255, 0.1); }

        .private-section, .edit-mode-only { display: none; }

        .sbi-profile-section-icon {
            width: 28px;
            height: 28px;
            border-radius: 9px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            background: rgba(42, 87, 255, 0.1);
            border: 1px solid rgba(42, 87, 255, 0.18);
            box-shadow: 0 0 16px rgba(42, 87, 255, 0.12);
            flex-shrink: 0;
        }

        .sbi-profile-section-icon svg {
            width: 17px;
            height: 17px;
            fill: currentColor;
        }

        .sbi-badges-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .badge-slot.sbi-badge-slot {
            width: auto;
            height: 76px;
            min-width: 0;
            border-radius: 14px;
            background: linear-gradient(180deg, rgba(255,255,255,0.94), rgba(248,250,252,0.82));
            border: 1px solid rgba(148, 163, 184, 0.32);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            font-size: 0;
            opacity: 0.42;
            filter: grayscale(100%);
            transition: transform 0.22s ease, opacity 0.22s ease, filter 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
            position: relative;
            overflow: hidden;
        }

        .badge-slot.sbi-badge-slot::after {
            content: attr(data-label);
            font-size: 0.62rem;
            line-height: 1;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
        }

        .badge-slot.sbi-badge-slot svg {
            width: 25px;
            height: 25px;
            fill: currentColor;
        }

        .badge-slot.sbi-badge-bronze { color: #b66a2f; }
        .badge-slot.sbi-badge-silver { color: #64748b; }
        .badge-slot.sbi-badge-gold { color: #d99a10; }
        .badge-slot.sbi-badge-diamond { color: #2a57ff; }

        .badge-slot.sbi-badge-slot.unlocked {
            opacity: 1;
            filter: grayscale(0%);
            background: linear-gradient(180deg, #ffffff, rgba(255,255,255,0.88));
            border-color: color-mix(in srgb, currentColor 38%, transparent);
            box-shadow: 0 10px 26px color-mix(in srgb, currentColor 18%, transparent);
            transform: translateY(-2px);
        }

        .student-sub-nav-item svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
            vertical-align: text-bottom;
            margin-right: 4px;
        }

        @media (max-width: 760px) {
            .profile-header { flex-direction: column; align-items: flex-start; padding: 1.5rem; }
            .sbi-badges-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
    </style>
</head>
<body class="preload">

<div class="app-container" id="app-container">
    <script>
        if (window.innerWidth > 1024 && localStorage.getItem('leftPanelCollapsed') === 'true') {
            document.getElementById('app-container').classList.add('left-collapsed');
        }
    </script>

    <student-left-panel></student-left-panel>
    <student-top-bar></student-top-bar>

    <main id="main-content">
        <div class="content-wrapper">
            
            <div class="profile-header">
                <div class="avatar-wrapper">
                    <img id="prof-avatar-img" src="" style="width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--bg-card); background: var(--bg-body); object-fit: cover;">
                    <div id="btn-trigger-crop" class="edit-avatar-badge edit-mode-only" title="Modifier la photo">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    </div>
                </div>

                <div class="profile-info">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div style="width: 100%; max-width: 400px;">
                            <h1 id="prof-name">Chargement...</h1>
                            <div style="margin-top: 0.5rem; display: inline-block; background: rgba(42, 87, 255, 0.1); color: var(--accent-blue); padding: 5px 15px; border-radius: 20px; font-weight: bold;">
                                Niveau <span id="prof-level">1</span> (<span id="prof-xp">0</span> XP)
                            </div>
                            <div class="xp-bar-bg" style="margin-top: 1rem;">
                                <div class="xp-bar-fill" id="prof-xp-fill"></div>
                            </div>
                        </div>
                        
                        <button id="btn-toggle-edit" class="private-section" style="display: none; background: white; border: 1px solid var(--border-color); color: var(--text-main); padding: 0.6rem 1.2rem; border-radius: 20px; font-weight: bold; cursor: pointer; align-items: center; gap: 0.5rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s;">
                            <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                            <span>Modifier mon profil</span>
                        </button>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1.2fr 2fr; gap: 2.5rem; align-items: start; width: 100%;">
                <div style="display: flex; flex-direction: column; gap: 2.5rem;">
                    <div class="hub-card">
                        <h3 class="section-title" style="margin-bottom: 1rem;">
                            <span class="sbi-profile-section-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24"><path d="M18 2h-3V1H9v1H6c-1.1 0-2 .9-2 2v3c0 2.55 1.92 4.64 4.39 4.95A5.99 5.99 0 0 0 11 15.92V18H8v2h8v-2h-3v-2.08a5.99 5.99 0 0 0 2.61-3.97C18.08 11.64 20 9.55 20 7V4c0-1.1-.9-2-2-2zM6 7V4h2v5.82A3.01 3.01 0 0 1 6 7zm12 0c0 1.3-.84 2.4-2 2.82V4h2v3z"/></svg>
                            </span>
                            Réussites
                        </h3>
                        <div class="badges-grid sbi-badges-grid">
                            <div class="badge-slot sbi-badge-slot sbi-badge-bronze" id="badge-bronze" title="Bronze" data-label="Bronze">
                                <svg viewBox="0 0 24 24"><path d="M12 2 4 5v6c0 5.55 3.84 10.74 8 12 4.16-1.26 8-6.45 8-12V5l-8-3zm0 3.18 5 1.88V11c0 3.93-2.45 7.7-5 8.83C9.45 18.7 7 14.93 7 11V7.06l5-1.88zM12 8l1.1 2.23 2.46.36-1.78 1.73.42 2.45L12 13.61l-2.2 1.16.42-2.45-1.78-1.73 2.46-.36L12 8z"/></svg>
                            </div>
                            <div class="badge-slot sbi-badge-slot sbi-badge-silver" id="badge-silver" title="Argent" data-label="Argent">
                                <svg viewBox="0 0 24 24"><path d="M17 3H7v4l3.2 3.2A6 6 0 1 0 13.8 10.2L17 7V3zm-2 3.17-2.4 2.4a6.4 6.4 0 0 0-1.2 0L9 6.17V5h6v1.17zM12 20a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm0-6 1.03 2.1 2.32.34-1.68 1.64.4 2.31L12 19.3l-2.07 1.09.4-2.31-1.68-1.64 2.32-.34L12 14z"/></svg>
                            </div>
                            <div class="badge-slot sbi-badge-slot sbi-badge-gold" id="badge-gold" title="Or" data-label="Or">
                                <svg viewBox="0 0 24 24"><path d="M12 2 9.2 8.3 2.5 9l5 4.6L6.1 20 12 16.7 17.9 20l-1.4-6.4 5-4.6-6.7-.7L12 2zm0 5 1.25 2.8 3.05.32-2.28 2.1.64 2.92L12 13.64l-2.66 1.5.64-2.92-2.28-2.1 3.05-.32L12 7z"/></svg>
                            </div>
                            <div class="badge-slot sbi-badge-slot sbi-badge-diamond" id="badge-diamond" title="Diamant" data-label="Diamant">
                                <svg viewBox="0 0 24 24"><path d="M6 3h12l4 6-10 12L2 9l4-6zm1.1 2L5.2 8h4.25L10.4 5H7.1zm5.1 0-1 3h5.6l-1-3h-3.6zm4.7 0 1.45 3h2.45l-2-3h-1.9zM5.1 10l5.15 6.2L8.95 10H5.1zm6 0L12 17.2 12.9 10h-1.8zm3.95 0-1.3 6.2L18.9 10h-3.85z"/></svg>
                            </div>
                        </div>
                    </div>

                    <div class="hub-card">
                        <h3 class="section-title" style="margin-bottom: 1rem;">
                            <span class="sbi-profile-section-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2zm1.2 4H20v10H4V6h5.2l2 2zM7 11h10v2H7v-2zm0 4h7v2H7v-2z"/></svg>
                            </span>
                            Formations
                        </h3>
                        <div id="prof-formations-list" style="display: flex; flex-direction: column; gap: 0.8rem; color: var(--text-muted); font-size: 0.95rem;">
                            Chargement...
                        </div>
                    </div>
                </div>

                <div>
                    <div class="student-sub-nav">
                        <div class="student-sub-nav-item active" onclick="switchTab('tab-overview')">Aperçu & Bio</div>
                        <div class="student-sub-nav-item private-section" onclick="switchTab('tab-private')">
                            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 17a2 2 0 0 0 2-2c0-.74-.4-1.38-1-1.72V12a1 1 0 0 0-2 0v1.28A2 2 0 0 0 12 17zm6-8h-1V7A5 5 0 0 0 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2zM9 7a3 3 0 0 1 6 0v2H9V7zm9 13H6v-9h12v9z"/></svg>
                            Données Privées
                        </div>
                        <div class="student-sub-nav-item" onclick="switchTab('tab-activity')">Historique</div>
                        <div class="student-sub-nav-item" onclick="switchTab('tab-tracking')">
                            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg> 
                            Mon Suivi
                        </div>
                    </div>

                    <div id="tab-overview" class="student-view active">
                        <div class="hub-card">
                            <h3 class="section-title" style="margin-bottom: 1.5rem;">Profil Public</h3>
                            <div class="form-group">
                                <label>À propos de moi (Bio)</label>
                                <textarea id="prof-bio" class="prof-input" rows="5" maxlength="400" placeholder="Dites-en plus sur vous... (Max 400 caractères)" disabled></textarea>
                            </div>
                            <div class="edit-mode-only" style="margin-top: 1.5rem;">
                                <button id="btn-save-public" class="action-btn" style="width: auto; background: var(--accent-blue); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: bold;">Enregistrer la bio</button>
                            </div>
                        </div>
                    </div>

                    <div id="tab-private" class="student-view">
                        <div class="hub-card private-section">
                            <h3 class="section-title" style="margin-bottom: 1.5rem;">Données Confidentielles</h3>
                            
                            <div class="form-group">
                                <label>Adresse E-mail</label>
                                <div style="display: flex; gap: 1rem; align-items: center;">
                                    <input type="email" id="prof-email" class="prof-input" disabled style="flex-grow: 1;">
                                    <button class="action-btn edit-mode-only" onclick="window.location.href='/change-email.html'" style="display: none; width: auto; margin: 0; background: transparent; color: var(--accent-blue); border: 1px solid var(--accent-blue); padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;" onmouseover="this.style.background='rgba(42, 87, 255, 0.1)'" onmouseout="this.style.background='transparent'">Modifier</button>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label>Numéro de téléphone</label>
                                <input type="tel" id="prof-phone" class="prof-input" placeholder="Votre numéro..." disabled>
                            </div>
                            <div class="form-group">
                                <label>Adresse postale</label>
                                <input type="text" id="prof-address" class="prof-input" placeholder="Votre adresse..." disabled>
                            </div>
                            <div class="form-group" style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                                <label>Temps de connexion total</label>
                                <p id="prof-time" style="font-size: 1.2rem; font-weight: bold; color: var(--accent-blue); margin: 0;">0h 0m</p>
                            </div>

                            <div class="edit-mode-only" style="margin-top: 1.5rem;">
                                <button id="btn-save-private" class="action-btn" style="width: auto; background: var(--text-main); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: bold;">Mettre à jour les données privées</button>
                            </div>
                        </div>
                    </div>

                    <div id="tab-activity" class="student-view">
                        <div class="hub-card">
                            <h3 class="section-title" style="margin-bottom: 1.5rem;">Activité Récente</h3>
                            <ul style="color: var(--text-muted); font-size: 0.95rem; padding-left: 1rem; line-height: 1.8;" id="prof-activity-list">
                                <li>Chargement...</li>
                            </ul>
                        </div>
                    </div>

                    <div id="tab-tracking" class="student-view">
                        <div class="hub-card">
                            <h3 class="section-title" style="margin-bottom: 1.5rem;">Progression détaillée</h3>
                            <div id="prof-tracking-list" style="display: flex; flex-direction: column; gap: 1rem;">
                                <p style="color: var(--text-muted); font-size: 0.9rem; font-style: italic;">Chargement du dossier pédagogique...</p>
                            </div>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </main>
</div>

<div id="crop-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; flex-direction: column;">
    <div style="background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border-color); width: 90%; max-width: 500px;">
        <h3 style="margin-top:0; color: var(--text-main); text-align: center;">Ajuster la photo</h3>
        <input type="file" id="pfp-file-input" accept="image/*" style="display: none;">
        <div style="width: 100%; height: 350px; background: #e5e7eb; overflow: hidden; margin-bottom: 1.5rem; border-radius: 8px;">
            <img id="crop-image" src="" style="display: block; max-width: 100%;">
        </div>
        <button id="btn-upload-new" style="width: 100%; padding: 0.8rem; background: transparent; color: var(--text-main); border: 2px dashed var(--text-muted); border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 1.5rem; transition: 0.2s;">
            Changer d'image
        </button>
        <div style="display: flex; gap: 1rem;">
            <button id="btn-save-crop" style="flex: 1; padding: 1rem; background: var(--accent-blue); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Appliquer</button>
            <button id="btn-cancel-crop" style="flex: 1; padding: 1rem; background: transparent; color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer;">Annuler</button>
        </div>
    </div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.student-sub-nav-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.student-view').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }
</script>

<script type="module" src="/admin/js/admin-notifications.js"></script>
<script src="/admin/js/sbi-safe-fixes.js"></script>
<script type="module" src="/admin/js/admin-ui.js"></script>
<script type="module" src="/admin/js/tracker.js"></script>
<script type="module" src="/js/profile-core.js"></script>

</body>
</html>
