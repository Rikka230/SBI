<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - SBI Student</title>
    
    <link rel="stylesheet" href="/admin/css/admin-layout.css">
    <link rel="stylesheet" href="/admin/css/admin.css">
    <link rel="stylesheet" href="/admin/css/admin-notifications.css">
    <link rel="stylesheet" href="/student/css/student.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    
    <script src="/admin/js/components.js"></script>
    
    <style>
        .profile-header { background: var(--bg-card); border-radius: 16px; border: 1px solid var(--border-color); padding: 2.5rem; display: flex; align-items: center; gap: 2rem; margin-bottom: 2.5rem; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); position: relative; overflow: hidden; }
        .profile-header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 100px; background: linear-gradient(90deg, var(--accent-green), #00ffa3); opacity: 0.15; z-index: 0; }
        
        .avatar-wrapper { position: relative; width: 120px; height: 120px; z-index: 1; margin: 0; flex-shrink: 0; }
        
        .profile-info { z-index: 1; flex-grow: 1; }
        .profile-info h1 { margin: 0 0 0.5rem 0; font-size: 2rem; color: var(--text-main); display: flex; align-items: center; gap: 0.5rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-main); font-size: 0.95rem; }
        .prof-input { width: 100%; padding: 0.8rem 1rem; border: 1px solid transparent; border-radius: 8px; background: transparent; color: var(--text-main); font-family: inherit; font-size: 0.95rem; outline: none; transition: 0.2s; }
        
        .editing .prof-input { background: #f9fafb; border-color: var(--border-color); }
        .editing .prof-input:focus { border-color: var(--accent-green); background: #fff; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }

        .private-section, .edit-mode-only { display: none; }
        
        .badges-grid { display: flex; gap: 10px; margin-top: 1rem; }
        .badge-slot { width: 40px; height: 40px; border-radius: 50%; background: #f3f4f6; border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; opacity: 0.3; filter: grayscale(100%); transition: 0.3s; }
        .badge-slot.unlocked { opacity: 1; filter: grayscale(0%); background: #ffffff; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-color: transparent; }
    </style>
</head>
<body class="preload">

<div class="app-container" id="app-container">
    <script>
        if (window.innerWidth > 1024 && localStorage.getItem('leftPanelCollapsed') === 'true') {
            document.getElementById('app-container').classList.add('left-collapsed');
        }
    </script>

    <student-left-panel></student-left-panel>
    <student-top-bar></student-top-bar>

    <main id="main-content">
        <div class="content-wrapper">
            
            <div class="profile-header">
                <div class="avatar-wrapper">
                    <img id="prof-avatar-img" src="" style="width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--bg-card); background: var(--bg-body); object-fit: cover;">
                    <div id="btn-trigger-crop" class="edit-avatar-badge edit-mode-only" title="Modifier la photo">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    </div>
                </div>

                <div class="profile-info">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div style="width: 100%; max-width: 400px;">
                            <h1 id="prof-name">Chargement...</h1>
                            <div style="margin-top: 0.5rem; display: inline-block; background: rgba(16, 185, 129, 0.1); color: var(--accent-green); padding: 5px 15px; border-radius: 20px; font-weight: bold;">
                                Niveau <span id="prof-level">1</span> (<span id="prof-xp">0</span> XP)
                            </div>
                            <div class="xp-bar-bg" style="margin-top: 1rem;">
                                <div class="xp-bar-fill" id="prof-xp-fill"></div>
                            </div>
                        </div>
                        
                        <button id="btn-toggle-edit" class="private-section" style="background: white; border: 1px solid var(--border-color); color: var(--text-main); padding: 0.6rem 1.2rem; border-radius: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s;">
                            <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                            <span>Modifier mon profil</span>
                        </button>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1.2fr 2fr; gap: 2.5rem; align-items: start; width: 100%;">
                <div style="display: flex; flex-direction: column; gap: 2.5rem;">
                    <div class="hub-card">
                        <h3 class="section-title" style="margin-bottom: 1rem;"><span class="section-icon">🏆</span> Réussites</h3>
                        <div class="badges-grid">
                            <div class="badge-slot" id="badge-bronze" title="Bronze">🥉</div>
                            <div class="badge-slot" id="badge-silver" title="Argent">🥈</div>
                            <div class="badge-slot" id="badge-gold" title="Or">🥇</div>
                            <div class="badge-slot" id="badge-diamond" title="Diamant">💎</div>
                        </div>
                    </div>

                    <div class="hub-card">
                        <h3 class="section-title" style="margin-bottom: 1rem;"><span class="section-icon">📚</span> Formations</h3>
                        <div id="prof-formations-list" style="display: flex; flex-direction: column; gap: 0.8rem; color: var(--text-muted); font-size: 0.95rem;">
                            Chargement...
                        </div>
                    </div>
                </div>

                <div>
                    <div class="student-sub-nav">
                        <div class="student-sub-nav-item active" onclick="switchTab('tab-overview')">Aperçu & Bio</div>
                        <div class="student-sub-nav-item private-section" onclick="switchTab('tab-private')">🔒 Données Privées</div>
                        <div class="student-sub-nav-item" onclick="switchTab('tab-activity')">Historique</div>
                        <div class="student-sub-nav-item" onclick="switchTab('tab-tracking')">
                            <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24" style="vertical-align:text-bottom; margin-right:4px;"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg> 
                            Mon Suivi
                        </div>
                    </div>

                    <div id="tab-overview" class="student-view active">
                        <div class="hub-card">
                            <h3 class="section-title" style="margin-bottom: 1.5rem;">Profil Public</h3>
                            <div class="form-group">
                                <label>À propos de moi (Bio)</label>
                                <textarea id="prof-bio" class="prof-input" rows="5" maxlength="400" placeholder="Dites-en plus sur vous... (Max 400 caractères)" disabled></textarea>
                            </div>
                            <div class="edit-mode-only" style="margin-top: 1.5rem;">
                                <button id="btn-save-public" class="action-btn" style="width: auto; background: var(--accent-green); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: bold;">Enregistrer la bio</button>
                            </div>
                        </div>
                    </div>

                    <div id="tab-private" class="student-view">
                        <div class="hub-card private-section">
                            <h3 class="section-title" style="margin-bottom: 1.5rem;">Données Confidentielles</h3>
                            
                            <div class="form-group">
                                <label>Adresse E-mail</label>
                                <div style="display: flex; gap: 1rem; align-items: center;">
                                    <input type="email" id="prof-email" class="prof-input" disabled style="flex-grow: 1;">
                                    <button class="action-btn edit-mode-only" onclick="window.location.href='/change-email.html'" style="display: none; width: auto; margin: 0; background: transparent; color: var(--accent-green); border: 1px solid var(--accent-green); padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;" onmouseover="this.style.background='rgba(16, 185, 129, 0.1)'" onmouseout="this.style.background='transparent'">Modifier</button>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label>Numéro de téléphone</label>
                                <input type="tel" id="prof-phone" class="prof-input" placeholder="Votre numéro..." disabled>
                            </div>
                            <div class="form-group">
                                <label>Adresse postale</label>
                                <input type="text" id="prof-address" class="prof-input" placeholder="Votre adresse..." disabled>
                            </div>
                            <div class="form-group" style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                                <label>Temps de connexion total</label>
                                <p id="prof-time" style="font-size: 1.2rem; font-weight: bold; color: var(--accent-green); margin: 0;">0h 0m</p>
                            </div>

                            <div class="edit-mode-only" style="margin-top: 1.5rem;">
                                <button id="btn-save-private" class="action-btn" style="width: auto; background: var(--text-main); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: bold;">Mettre à jour les données privées</button>
                            </div>
                        </div>
                    </div>

                    <div id="tab-activity" class="student-view">
                        <div class="hub-card">
                            <h3 class="section-title" style="margin-bottom: 1.5rem;">Activité Récente</h3>
                            <ul style="color: var(--text-muted); font-size: 0.95rem; padding-left: 1rem; line-height: 1.8;" id="prof-activity-list">
                                <li>Chargement...</li>
                            </ul>
                        </div>
                    </div>

                    <div id="tab-tracking" class="student-view">
                        <div class="hub-card">
                            <h3 class="section-title" style="margin-bottom: 1.5rem;">Progression détaillée</h3>
                            <div id="prof-tracking-list" style="display: flex; flex-direction: column; gap: 1rem;">
                                <p style="color: var(--text-muted); font-size: 0.9rem; font-style: italic;">Chargement du dossier pédagogique...</p>
                            </div>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </main>
</div>

<div id="crop-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; flex-direction: column;">
    <div style="background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border-color); width: 90%; max-width: 500px;">
        <h3 style="margin-top:0; color: var(--text-main); text-align: center;">Ajuster la photo</h3>
        <input type="file" id="pfp-file-input" accept="image/*" style="display: none;">
        <div style="width: 100%; height: 350px; background: #e5e7eb; overflow: hidden; margin-bottom: 1.5rem; border-radius: 8px;">
            <img id="crop-image" src="" style="display: block; max-width: 100%;">
        </div>
        <button id="btn-upload-new" style="width: 100%; padding: 0.8rem; background: transparent; color: var(--text-main); border: 2px dashed var(--text-muted); border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 1.5rem; transition: 0.2s;">
            Changer d'image
        </button>
        <div style="display: flex; gap: 1rem;">
            <button id="btn-save-crop" style="flex: 1; padding: 1rem; background: var(--accent-green); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Appliquer</button>
            <button id="btn-cancel-crop" style="flex: 1; padding: 1rem; background: transparent; color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer;">Annuler</button>
        </div>
    </div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.student-sub-nav-item').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.student-view').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }
</script>

<script type="module" src="/admin/js/admin-ui.js"></script>
<script type="module" src="/admin/js/tracker.js"></script>
<script type="module" src="/js/profile-core.js"></script>

</body>
</html>
