<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Cours - SBI Student</title>
    
    <link rel="stylesheet" href="/admin/css/admin-layout.css">
    <link rel="stylesheet" href="/admin/css/admin.css">
    <link rel="stylesheet" href="/student/css/student.css">
    <script src="/admin/js/components.js"></script>

    <style>
        .formation-folder { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; cursor: pointer; transition: 0.2s; }
        .formation-folder:hover { border-color: var(--accent-blue); box-shadow: 0 4px 15px rgba(42, 87, 255, 0.1); transform: translateY(-3px); }
        .progress-bar-bg { width: 100%; height: 6px; background: #e5e7eb; border-radius: 10px; overflow: hidden; margin-top: 1rem; }
        .progress-bar-fill { height: 100%; background: var(--accent-blue); width: 0%; transition: width 0.5s ease; }
        
        .bloc-title { font-size: 1.1rem; color: var(--text-main); font-weight: bold; margin: 2rem 0 1rem 0; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border-color); }
        
        .course-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; cursor: pointer; transition: 0.2s; }
        .course-item:hover { border-color: var(--accent-blue); background: rgba(42, 87, 255, 0.02); }
        .course-item.locked { opacity: 0.6; cursor: not-allowed; filter: grayscale(100%); }
        .course-item.locked:hover { border-color: var(--border-color); background: var(--bg-card); }
    </style>
</head>
<body class="preload">

<div class="app-container" id="app-container">
    <script>
        if (window.innerWidth > 1024 && localStorage.getItem('leftPanelCollapsed') === 'true') {
            document.getElementById('app-container').classList.add('left-collapsed');
        }
    </script>

    <student-left-panel></student-left-panel>
    <student-top-bar></student-top-bar>

    <main id="main-content">
        <div class="content-wrapper">
            
            <div id="view-formations" style="display: flex; flex-direction: column;">
                <h1 style="margin-top: 0; font-size: 2.2rem; font-weight: 800; margin-bottom: 2rem;">Mes <span style="color: var(--accent-blue);">Formations</span></h1>
                
                <div id="formations-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">
                    <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24" class="spinning" style="margin-right:10px;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                    Analyse de vos formations...
                </div>
            </div>

            <div id="view-courses" style="display: none; flex-direction: column;">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem;">
                    
                    <h1 id="current-formation-title" style="margin: 0; color: var(--accent-blue); font-size: 2.2rem; font-weight: 800;">...</h1>
                    
                    <div style="position: relative; margin: 0; max-width: 300px; width: 100%;">
                        <svg viewBox="0 0 24 24" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); width: 18px; fill: var(--text-muted);"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        <input type="text" id="search-course-input" placeholder="Chercher un cours..." style="width: 100%; box-sizing: border-box; padding: 0.7rem 1.5rem 0.7rem 2.8rem; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; outline: none; font-size: 0.95rem; color: var(--text-main);">
                    </div>
                </div>

                <button id="btn-back-formations" class="action-btn" style="width: auto; align-self: flex-start; background: white; color: var(--text-main); border: 1px solid var(--border-color); margin-bottom: 1.5rem;">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24" style="margin-right: 8px;"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg> Retour aux formations
                </button>

                <div id="courses-list"></div>
            </div>

        </div>
    </main>
</div>

<script type="module" src="/admin/js/admin-ui.js"></script>
<script type="module" src="/admin/js/tracker.js"></script>
<script type="module" src="/student/js/mes-cours.js"></script>
<script type="module" src="/admin/js/admin-notifications.js"></script>
</body>
</html>
