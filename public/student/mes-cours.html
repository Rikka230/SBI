<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Cours - SBI Student</title>
    
    <link rel="stylesheet" href="/admin/css/admin-layout.css">
    <link rel="stylesheet" href="/admin/css/admin.css">
    <link rel="stylesheet" href="/student/css/student.css">
    <script src="/admin/js/components.js"></script>

    <style>
        .formation-folder { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; cursor: pointer; transition: 0.2s; }
        .formation-folder:hover { border-color: var(--accent-green); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.1); transform: translateY(-3px); }
        .progress-bar-bg { width: 100%; height: 6px; background: #e5e7eb; border-radius: 10px; overflow: hidden; margin-top: 1rem; }
        .progress-bar-fill { height: 100%; background: var(--accent-green); width: 0%; transition: width 0.5s ease; }
        
        .bloc-title { font-size: 1.1rem; color: var(--text-main); font-weight: bold; margin: 2rem 0 1rem 0; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; }
        
        .course-item { display: flex; align-items: center; justify-content: space-between; padding: 1rem; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 0.8rem; cursor: pointer; transition: 0.2s; }
        .course-item:hover { border-color: var(--accent-green); background: rgba(16, 185, 129, 0.02); }
        
        .status-badge { font-size: 0.75rem; font-weight: bold; padding: 4px 10px; border-radius: 20px; }
        .status-done { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); }
        .status-progress { background: rgba(251, 188, 4, 0.1); color: var(--accent-yellow); }
        .status-todo { background: #f3f4f6; color: var(--text-muted); }
    </style>
</head>
<body class="preload">

<div class="app-container" id="app-container">
    <student-left-panel></student-left-panel>
    <student-top-bar></student-top-bar>

    <main id="main-content">
        <div class="content-wrapper">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1 style="margin: 0; font-size: 2.2rem; font-weight: 800;">Mes <span style="color: var(--accent-green);">Cours</span> 📚</h1>
                <button id="btn-back-formations" class="action-btn" style="display: none; width: auto; background: white; color: var(--text-main); border-color: var(--border-color);">⬅ Retour aux Formations</button>
            </div>

            <div id="view-formations" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
                <p style="color: var(--text-muted);">Analyse de vos formations en cours...</p>
            </div>

            <div id="view-courses" style="display: none; flex-direction: column;">
                <h2 id="current-formation-title" style="margin-top: 0; color: var(--accent-green);">...</h2>
                <div id="courses-list-container"></div>
            </div>

        </div>
    </main>
</div>

<script type="module" src="/admin/js/admin-ui.js"></script>
<script type="module" src="/admin/js/tracker.js"></script>
<script type="module" src="/student/js/mes-cours.js"></script>
</body>
</html>
