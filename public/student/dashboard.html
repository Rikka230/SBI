<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBI Student - Mon Hub</title>
    
    <link rel="stylesheet" href="/css/admin-layout.css">
    <link rel="stylesheet" href="/css/admin.css">
    <link rel="stylesheet" href="/css/admin-notifications.css">
    <script src="/js/components.js"></script>
    
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        .hub-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; margin-top: 2rem; align-items: start; }
        .hub-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; }
        
        /* Barre d'XP */
        .xp-bar-bg { width: 100%; height: 12px; background: #111; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-green), #00ffa3); width: 0%; transition: width 1s ease-out; }
        
        /* Barre de recherche (Maquette) */
        .search-bar-top { flex-grow: 1; max-width: 500px; position: relative; margin-left: 1rem; }
        .search-bar-top input { width: 100%; padding: 0.6rem 1.5rem 0.6rem 2.5rem; background: #111; border: 1px solid #333; border-radius: 20px; color: white; outline: none; transition: 0.2s; font-family: inherit; }
        .search-bar-top input:focus { border-color: var(--accent-green); }
        .search-bar-top svg { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); fill: #666; width: 16px; height: 16px; }
        
        @media (max-width: 768px) { 
            .hub-grid { grid-template-columns: 1fr; } 
            .search-bar-top { display: none; } 
        }
    </style>
</head>
<body class="preload">

<div class="app-container" id="app-container">
    
    <script>
        if (window.innerWidth > 1024) {
            const app = document.getElementById('app-container');
            if (localStorage.getItem('leftPanelCollapsed') === 'true') app.classList.add('left-collapsed');
        }
    </script>

    <student-left-panel></student-left-panel>

    <header class="top-bar">
        <button class="mobile-toggle left-toggle" id="btn-toggle-mobile"><svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg></button>
        
        <div class="search-bar-top">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <input type="text" placeholder="Rechercher un cours, une ressource...">
        </div>

        <div style="display: flex; align-items: center; gap: 1.5rem; margin-left: auto; padding-right: 1rem;">
            <div style="position: relative; cursor: pointer;">
                <svg style="width: 22px; height: 22px; fill: var(--text-muted);" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/></svg>
                <span class="notif-badge" id="bell-badge" style="display:none; top: -5px; right: -5px;">0</span>
            </div>
            
            <div style="display: flex; align-items: center; gap: 0.8rem; cursor: pointer; border-left: 1px solid #333; padding-left: 1.5rem;" onclick="window.location.href='mon-profil.html'">
                <div style="text-align: right; display: flex; flex-direction: column; justify-content: center;">
                    <p id="top-user-name" style="margin: 0; font-weight: bold; font-size: 0.9rem; line-height: 1.2;">Chargement...</p>
                    <p id="top-user-level" style="margin: 0; color: var(--accent-green); font-size: 0.75rem; line-height: 1.2;">Niveau -</p>
                </div>
                <div id="top-user-avatar" style="width: 40px; height: 40px; border-radius: 50%; background: #222; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0;"></div>
            </div>
        </div>
    </header>

    <main id="main-content">
        <div class="content-wrapper">
            <h1 style="margin-top: 0;">Bienvenue sur votre <span style="color: var(--accent-green);">Hub</span> 👋</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Reprenez votre apprentissage là où vous l'avez laissé.</p>

            <div class="hub-grid">
                <div class="left-col" style="display: flex; flex-direction: column; gap: 2rem;">
                    <div class="hub-card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                            <h3 style="margin: 0; display: flex; align-items: center; gap: 0.5rem;"><span style="font-size: 1.5rem;">🎮</span> Ma Progression</h3>
                            <span style="color: var(--accent-green); font-weight: bold;">Niveau <span id="hub-level">1</span></span>
                        </div>
                        <div class="xp-bar-bg">
                            <div class="xp-bar-fill" id="hub-xp-fill"></div>
                        </div>
                        <p style="font-size: 0.85rem; color: var(--text-muted); text-align: right; margin-top: 0.5rem; margin-bottom: 0;"><span id="hub-xp">0</span> / 1000 XP</p>
                    </div>

                    <div class="hub-card">
                        <h3 style="margin: 0 0 1rem 0; display: flex; align-items: center; gap: 0.5rem;"><span style="font-size: 1.5rem;">📚</span> Mes cours récents</h3>
                        <div id="recent-courses-list">
                            <p style="color: var(--text-muted); font-style: italic;">Aucun cours commencé pour le moment.</p>
                        </div>
                        <button class="action-btn" style="width: 100%; margin-top: 1.5rem; justify-content: center; background: rgba(0, 255, 163, 0.1); color: var(--accent-green); border: 1px solid var(--accent-green);" onclick="window.location.href='mes-cours.html'">
                            Explorer la bibliothèque
                        </button>
                    </div>
                </div>

                <div class="right-col" style="display: flex; flex-direction: column; gap: 2rem;">
                    <div class="hub-card" style="background: linear-gradient(145deg, #111 0%, #1a1a1a 100%); height: 100%;">
                        <h3 style="margin: 0 0 1rem 0; display: flex; align-items: center; gap: 0.5rem;"><span style="font-size: 1.5rem;">📁</span> Mes Formations</h3>
                        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem;">Votre plan d'étude basé sur vos accès.</p>
                        
                        <div id="assigned-formations-list" style="display: flex; flex-direction: column; gap: 0.5rem; color: var(--text-muted);">
                            Recherche de vos modules...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

</div>

<script type="module" src="/js/admin-ui.js"></script>
<script type="module" src="/js/tracker.js"></script>
<script type="module" src="/student/js/student-hub.js"></script>

</body>
</html>
