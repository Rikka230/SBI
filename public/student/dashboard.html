<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBI Student - Mon Hub</title>
    
    <link rel="stylesheet" href="/admin/css/admin-layout.css">
    <link rel="stylesheet" href="/admin/css/admin.css">
    <link rel="stylesheet" href="/admin/css/admin-notifications.css">
    <link rel="stylesheet" href="/student/css/student.css">
    <script src="/admin/js/components.js"></script>
</head>
<body class="preload">

<div class="app-container" id="app-container">
    <script>
        if (window.innerWidth > 1024 && localStorage.getItem('leftPanelCollapsed') === 'true') {
            document.getElementById('app-container').classList.add('left-collapsed');
        }
    </script>

    <student-left-panel></student-left-panel>
    <student-top-bar></student-top-bar>

    <main id="main-content">
        <div class="content-wrapper">
            <h1 style="margin-top: 0; font-size: 2.2rem; font-weight: 800;">Bienvenue sur votre <span style="color: var(--accent-green);">Hub</span> 👋</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2.5rem;">Prêt à continuer votre apprentissage aujourd'hui ?</p>

            <div class="hub-grid">
                <div class="left-col" style="display: flex; flex-direction: column; gap: 2.5rem;">
                    <div class="hub-card">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <h3 class="section-title">
                                <span class="section-icon">
                                    <svg width="24" height="24" fill="var(--accent-green)" viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm3-3c-.83 0-1.5-.67-1.5-1.5S17.67 9 18.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
                                </span> 
                                Ma Progression
                            </h3>
                            <span style="color: var(--accent-green); font-weight: 800; font-size: 1.1rem; background: rgba(16, 185, 129, 0.1); padding: 4px 12px; border-radius: 20px;">Niveau <span id="hub-level">1</span></span>
                        </div>
                        <div class="xp-bar-bg"><div class="xp-bar-fill" id="hub-xp-fill"></div></div>
                        <p style="font-size: 0.85rem; color: var(--text-muted); font-weight: 600; text-align: right; margin-top: 0.8rem; margin-bottom: 0;"><span id="hub-xp">0</span> / 1000 XP</p>
                    </div>

                    <div class="hub-card">
                        <h3 class="section-title" style="margin-bottom: 1.5rem;">
                            <span class="section-icon">
                                <svg width="24" height="24" fill="var(--accent-green)" viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/></svg>
                            </span> Mes cours récents
                        </h3>
                        <div id="recent-courses-list" style="min-height: 120px; display: flex; align-items: center; justify-content: center; background: #f9fafb; border-radius: 10px; border: 1px dashed #d1d5db;">
                            <p style="color: var(--text-muted); font-style: italic; margin: 0;">Aucun cours commencé.</p>
                        </div>
                        <button class="action-btn" style="width: 100%; margin-top: 1.5rem; justify-content: center; background: rgba(16, 185, 129, 0.1); color: var(--accent-green); border: 1px solid rgba(16, 185, 129, 0.3); padding: 1rem; border-radius: 10px; font-weight: bold; transition: 0.3s;" onclick="window.location.href='/student/mes-cours.html'">
                            Explorer la bibliothèque
                        </button>
                    </div>
                </div>

                <div class="right-col" style="display: flex; flex-direction: column; gap: 2.5rem;">
                    <div class="hub-card" style="height: 100%; display: flex; flex-direction: column;">
                        <h3 class="section-title">
                            <span class="section-icon">
                                <svg width="24" height="24" fill="var(--accent-green)" viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                            </span> Mes Formations
                        </h3>
                        <p style="font-size: 0.95rem; color: var(--text-muted); margin: 1rem 0 2rem 0; line-height: 1.5;">Plan d'étude assigné par l'équipe pédagogique.</p>
                        <div id="assigned-formations-list" style="display: flex; flex-direction: column; gap: 0.8rem; color: var(--text-muted);">
                            Recherche...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script type="module" src="/admin/js/admin-ui.js"></script>
<script type="module" src="/admin/js/tracker.js"></script>
<script type="module" src="/student/js/student-hub.js"></script>
</body>
</html>
