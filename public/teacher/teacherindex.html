<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Enseignant - SBI</title>
    
    <link rel="stylesheet" href="../admin/css/admin-notifications.css">
    
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dashboard-header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            position: relative;
        }
        .btn-logout {
            background-color: #ff4a4a;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .content-area {
            width: 100%;
            max-width: 1000px;
            text-align: center;
            padding: 3rem;
            background: #111;
            border: 1px solid #222;
            border-radius: 8px;
        }
        /* Panneau de notification flottant pour le Professeur */
        #notifications-section {
            position: absolute;
            top: 50px;
            right: 0;
            width: 320px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 1000;
            text-align: left;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div class="dashboard-header">
        <h1>👨‍🏫 Espace Enseignant</h1>
        
        <div class="header-actions">
            <div id="notif-bell-btn" style="position: relative; cursor: pointer; display: flex; align-items: center; padding: 5px;">
                <svg style="width: 24px; height: 24px; fill: #9ca3af; transition: fill 0.2s;" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/></svg>
                <span class="notif-badge" id="bell-badge" style="display:none;">0</span>
            </div>

            <button id="logout-btn" class="btn-logout">🚪 Déconnexion</button>

            <div id="notifications-section" style="display:none;">
                <div style="padding: 1rem; border-bottom: 1px solid #333; font-weight: bold; color: #9ca3af; font-size: 0.9rem;" id="notif-panel-title">VOS NOTIFICATIONS</div>
                <div id="notifications-list" style="display: flex; flex-direction: column;"></div>
            </div>
            
            <div id="profile-section" style="display:none;"></div> 
        </div>
    </div>

    <div class="content-area">
        <h2>Bienvenue sur votre tableau de bord</h2>
        <p style="color: #888;">Prêt à créer du nouveau contenu ?</p>
        
        <button id="btn-create-formation" style="margin-top: 2rem; padding: 1rem 2rem; background: #2ed573; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s;">
            + Créer un cours de Test (Envoi Notification)
        </button>
    </div>

    <script type="module" src="../admin/js/admin-notifications.js"></script>

    <script type="module">
        import { logoutUser } from '../js/auth.js';
        import { db, auth } from '../js/firebase-init.js';
        import { collection, addDoc, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        let currentUid = null;
        let currentUserProfile = null;

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('logout-btn').addEventListener('click', logoutUser);

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUid = user.uid;
                    const userSnap = await getDoc(doc(db, "users", currentUid));
                    if (userSnap.exists()) {
                        currentUserProfile = userSnap.data();
                    }
                } else {
                    window.location.replace('../login.html');
                }
            });

            document.getElementById('btn-create-formation').addEventListener('click', async () => {
                if (!currentUid) return;

                const btn = document.getElementById('btn-create-formation');
                btn.textContent = "Création et envoi en cours...";
                btn.disabled = true;
                btn.style.opacity = "0.5";

                try {
                    const testTitle = "Cours de Test Teacher";
                    
                    const courseRef = await addDoc(collection(db, "courses"), {
                        titre: testTitle,
                        actif: false,
                        statutValidation: "pending",
                        formations: [], 
                        auteurId: currentUid,
                        chapitres: [{
                            id: "chap_test",
                            type: "text",
                            titre: "Étape Générée",
                            contenu: "<p>Ceci est un cours de test généré par le bouton pour tester la cloche de notification.</p>",
                            mediaType: "image",
                            mediaImage: "",
                            mediaVideo: ""
                        }],
                        dateCreation: serverTimestamp()
                    });

                    let auteurName = "Professeur Inconnu";
                    if (currentUserProfile) {
                        auteurName = `${currentUserProfile.prenom || ''} ${currentUserProfile.nom || ''}`.trim() || currentUserProfile.email;
                    }

                    await addDoc(collection(db, "notifications"), {
                        type: 'course_validation',
                        courseId: courseRef.id,
                        courseTitle: testTitle,
                        auteurId: currentUid,
                        auteurName: auteurName,
                        dateCreation: serverTimestamp()
                    });

                    alert("✅ Faux cours créé ! Attendez la validation de l'Admin !");
                    
                } catch (error) {
                    console.error(error);
                    alert("❌ Erreur lors de la création.");
                } finally {
                    btn.textContent = "+ Créer un cours de Test (Envoi Notification)";
                    btn.disabled = false;
                    btn.style.opacity = "1";
                }
            });
        });
    </script>
</body>
</html>
